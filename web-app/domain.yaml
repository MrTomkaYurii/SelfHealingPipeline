DomainName: SelfHealingPipeline
Version: "1.0"

BoundedContexts:
  - ProjectName: PipelineHistory
    Port: 5000
    DbContext:
      ContextName: PipelineHistoryDbContext
      DatabaseName: pipeline_history
      Provider: Postgres
    Environments:
      - EnvironmentName: Development
        ConnectionString: "Host=localhost;Port=5432;Database=pipeline_history;Username=postgres;Password=postgres"
        ProfileName: Development
    JwtSettings:
      Audience: pipeline-history
      Authority: http://localhost:8080/realms/selfhealingpipeline
    SwaggerConfig:
      Title: PipelineHistory API
      Description: API for tracking Airflow pipeline run history
      SwaggerEndpointUrl: /swagger/v1/swagger.json
      OAuthClientId: pipeline-history-swagger
      OAuthClientSecret: ""
      AuthorizationUrl: http://localhost:8080/realms/selfhealingpipeline/protocol/openid-connect/auth
      TokenUrl: http://localhost:8080/realms/selfhealingpipeline/protocol/openid-connect/token
    Entities:
      - Name: PipelineRun
        Features:
          - Type: GetList
            IsProtected: true
          - Type: GetRecord
            IsProtected: true
          - Type: AddRecord
            IsProtected: true
          - Type: UpdateRecord
            IsProtected: true
          - Type: DeleteRecord
            IsProtected: true
        Properties:
          - Name: UserId
            Type: string
            CanFilter: true
            CanSort: true
          - Name: DagRunId
            Type: string
            CanFilter: true
            CanSort: true
          - Name: StartedAt
            Type: DateTimeOffset?
            CanFilter: true
            CanSort: true
          - Name: FinishedAt
            Type: DateTimeOffset?
            CanFilter: true
            CanSort: true
          - Name: BatchSize
            Type: int?
            CanFilter: true
            CanSort: true
          - Name: Offset
            Type: int?
            CanFilter: true
            CanSort: true
          - Name: OllamaModel
            Type: string
            CanFilter: true
            CanSort: true
          - Name: Status
            Type: string
            CanFilter: true
            CanSort: true
          - Name: OutputFilePath
            Type: string
            CanFilter: false
            CanSort: false
